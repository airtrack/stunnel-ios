name: stunnel-ios
options:
  bundleIdPrefix: com.airtrack.stunnel
  developmentLanguage: en

targets:
  stunnel-ios:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    bundleId: com.airtrack.stunnel
    sources:
      - path: App
      - path: Shared
    info:
      path: App/Info.plist
    dependencies:
      - target: PacketTunnel
        embed: true
    settings:
      SWIFT_VERSION: 5.0
      CODE_SIGN_ENTITLEMENTS: stunnel-ios.entitlements

  PacketTunnel:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    bundleId: com.airtrack.stunnel.PacketTunnel
    sources:
      - path: PacketTunnel
      - path: Shared
    info:
      path: PacketTunnel/Info.plist
    dependencies:
      - sdk: NetworkExtension.framework
      - sdk: Security.framework
    settings:
      SWIFT_VERSION: 5.0
      CODE_SIGN_ENTITLEMENTS: PacketTunnel.entitlements
      SWIFT_OBJC_BRIDGING_HEADER: Shared/RustBridge.h
      LIBRARY_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../rust-core/target/aarch64-apple-ios-sim/release"
      OTHER_LDFLAGS: "$(inherited) -lrust_core -lresolv"
