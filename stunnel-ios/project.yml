name: stunnel-ios
options:
  bundleIdPrefix: me.airtrack.stunnel
  developmentLanguage: en

targets:
  stunnel-ios:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    bundleId: me.airtrack.stunnel
    sources:
      - path: App
      - path: Shared
        excludes:
          - PacketTunnelRuntimeCoordinator.swift
    info:
      path: App/Info.plist
    dependencies:
      - sdk: AppIntents.framework
      - target: PacketTunnel
        embed: true
    settings:
      SWIFT_VERSION: 5.0
      CODE_SIGN_ENTITLEMENTS: stunnel-ios.entitlements
      PRODUCT_BUNDLE_IDENTIFIER: me.airtrack.stunnel
      ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64

  PacketTunnel:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    bundleId: me.airtrack.stunnel.PacketTunnel
    sources:
      - path: PacketTunnel
      - path: Shared
    info:
      path: PacketTunnel/Info.plist
    dependencies:
      - sdk: AppIntents.framework
      - sdk: NetworkExtension.framework
      - sdk: Security.framework
    settings:
      SWIFT_VERSION: 5.0
      CODE_SIGN_ENTITLEMENTS: PacketTunnel.entitlements
      PRODUCT_BUNDLE_IDENTIFIER: me.airtrack.stunnel.PacketTunnel
      ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      SWIFT_OBJC_BRIDGING_HEADER: Shared/StunnelBridge.h
      LIBRARY_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../stunnel-core/target/aarch64-apple-ios-sim/$(CONFIGURATION:lower)"
      OTHER_LDFLAGS: "$(inherited) -lstunnel_core -lresolv"
      EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64

  stunnel-iosTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests
      - path: Shared/PacketTunnelRuntimeCoordinator.swift
    dependencies:
      - target: stunnel-ios
    settings:
      SWIFT_VERSION: 5.0
      PRODUCT_BUNDLE_IDENTIFIER: me.airtrack.stunnel.tests
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/stunnel-ios.app/stunnel-ios"
      BUNDLE_LOADER: "$(TEST_HOST)"
      EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
