name: stunnel-ios
options:
  bundleIdPrefix: me.airtrack.stunnel
  developmentLanguage: en

targets:
  stunnel-ios:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    bundleId: me.airtrack.stunnel
    sources:
      - path: App
      - path: Shared
    info:
      path: App/Info.plist
    dependencies:
      - target: PacketTunnel
        embed: true
    settings:
      SWIFT_VERSION: 5.0
      CODE_SIGN_ENTITLEMENTS: stunnel-ios.entitlements
      # Exclude x86_64 architecture to avoid linker conflicts
      EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64

      PacketTunnel:
      type: app-extension
      platform: iOS
      deploymentTarget: "18.0"
      bundleId: me.airtrack.stunnel.PacketTunnel
      sources:
      - path: PacketTunnel
      - path: Shared
      info:
      path: PacketTunnel/Info.plist
      dependencies:
      - sdk: NetworkExtension.framework
      - sdk: Security.framework
      settings:
      SWIFT_VERSION: 5.0
      CODE_SIGN_ENTITLEMENTS: PacketTunnel.entitlements
      PRODUCT_BUNDLE_IDENTIFIER: me.airtrack.stunnel.PacketTunnel
      SWIFT_OBJC_BRIDGING_HEADER: Shared/RustBridge.h
      # Dynamically adapt Debug/Release paths
      LIBRARY_SEARCH_PATHS: "$(inherited) $(SRCROOT)/../rust-core/target/aarch64-apple-ios-sim/$(CONFIGURATION:lower)"
      OTHER_LDFLAGS: "$(inherited) -lrust_core -lresolv"
      # Exclude x86_64 architecture
      EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64

